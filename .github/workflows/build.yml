name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: assistant-bot
          path: build/libs/assistant-bot-*.jar
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew clean build

      - name: Prepare release assets
        run: |
          rm -rf release-assets
          mkdir -p release-assets
          runtime_jars="$(find build/libs -maxdepth 1 -type f -name 'assistant-bot-*.jar' ! -name '*-sources.jar' | sort)"
          runtime_count="$(printf '%s\n' "${runtime_jars}" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "${runtime_count}" != "1" ]; then
            echo "Expected exactly one assistant-bot runtime JAR in build/libs, found ${runtime_count}" >&2
            find build/libs -maxdepth 1 -type f -print >&2
            exit 1
          fi

          runtime_jar="${runtime_jars}"
          sources_jar="${runtime_jar%.jar}-sources.jar"

          cp "${runtime_jar}" release-assets/assistant-bot.jar
          cp "${runtime_jar}" release-assets/

          if [ -f "${sources_jar}" ]; then
            cp "${sources_jar}" release-assets/
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.jar
          generate_release_notes: true
